<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidador Inteligente de Planilhas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SheetJS for Excel/CSV parsing and exporting -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            900: '#7c2d12',
                            950: '#431407',
                        },
                        dark: {
                            bg: '#050505',       /* Fundo principal super escuro (quase preto) */
                            card: '#111111',     /* Fundo dos cartões */
                            surface: '#1a1a1a',  /* Superfícies secundárias */
                            border: '#333333',   /* Bordas */
                            text: '#f5f5f5',     /* Texto principal */
                            muted: '#a3a3a3',    /* Texto secundário */
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; font-family: 'Inter', 'Segoe UI', sans-serif; color: #f5f5f5; }
        .table-container { max-height: calc(100vh - 400px); min-height: 400px; overflow-y: auto; }
        th { position: sticky; top: 0; z-index: 10; background-color: #1a1a1a; }
        
        /* Custom Scrollbar for Dark Theme */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #525252; }
    </style>
</head>
<body class="bg-dark-bg text-dark-text antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [files, setFiles] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [result, setResult] = useState(null);
            const [activeTab, setActiveTab] = useState('produtividade');
            const [isDragging, setIsDragging] = useState(false);
            const fileInputRef = useRef(null);

            useEffect(() => {
                lucide.createIcons();
            }, [result, activeTab, files, isDragging]);

            const handleFileChange = (e) => {
                const selectedFiles = Array.from(e.target.files);
                setFiles(prev => [...prev, ...selectedFiles]);
                setResult(null); 
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const droppedFiles = Array.from(e.dataTransfer.files);
                    setFiles(prev => [...prev, ...droppedFiles]);
                    setResult(null);
                }
            };

            const clearFiles = (e) => {
                e.stopPropagation();
                setFiles([]);
                setResult(null);
                if (fileInputRef.current) fileInputRef.current.value = "";
            };

            const parseDateString = (dateStr) => {
                if (!dateStr || typeof dateStr !== 'string') return null;
                const parts = dateStr.trim().split('/');
                if (parts.length === 3) {
                    const d = parseInt(parts[0], 10);
                    const m = parseInt(parts[1], 10);
                    const y = parseInt(parts[2], 10);
                    if (!isNaN(d) && !isNaN(m) && !isNaN(y)) {
                        return new Date(y, m - 1, d);
                    }
                }
                return null;
            };

            const formatDate = (date) => {
                if (!date || !(date instanceof Date) || isNaN(date.getTime())) return "";
                const d = String(date.getDate()).padStart(2, '0');
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const y = date.getFullYear();
                return `${d}/${m}/${y}`;
            };

            const processFiles = async () => {
                if (files.length === 0) return;
                setIsProcessing(true);

                let globalProdutividade = {};
                let globalChamados = {};
                
                let minDate = null;
                let maxDate = null;
                
                let produtividadeHeaders = [];
                let chamadosHeaders = [];
                let globalOutrasAbas = {};

                try {
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        
                        try {
                            const buffer = await file.arrayBuffer();
                            const workbook = XLSX.read(buffer, { type: 'array' });
                            
                            for (let s = 0; s < workbook.SheetNames.length; s++) {
                                const sheetName = workbook.SheetNames[s];
                                const worksheet = workbook.Sheets[sheetName];
                                
                                const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                                if (!rows || rows.length === 0) continue;

                                const isProdutividade = rows.some(r => Array.isArray(r) && (
                                    r.some(c => String(c).includes('Relatório de Produtividade')) || 
                                    (r.some(c => String(c).trim() === 'ID') && r.some(c => String(c).trim() === 'Recebidos'))
                                ));
                                
                                const isChamados = rows.some(r => Array.isArray(r) && (
                                    r.some(c => String(c).trim() === 'Nº') && 
                                    r.some(c => String(c).includes('Atividade') || String(c).includes('Situação') || String(c).includes('Criado'))
                                ));

                                if (isProdutividade) {
                                    const periodRow = rows.find(r => Array.isArray(r) && r.some(c => String(c).trim() === 'Periodo'));
                                    if (periodRow) {
                                        let periodCell = periodRow.find(c => typeof c === 'string' && c.includes('-'));
                                        if (!periodCell && periodRow.length > 2) periodCell = periodRow[2];

                                        if (periodCell) {
                                            const periodStr = String(periodCell); 
                                            const dates = periodStr.split('-');
                                            if (dates.length === 2) {
                                                const start = parseDateString(dates[0]);
                                                const end = parseDateString(dates[1]);
                                                
                                                if (start && (!minDate || start < minDate)) minDate = start;
                                                if (end && (!maxDate || end > maxDate)) maxDate = end;
                                            }
                                        }
                                    }

                                    let headerIdx = rows.findIndex(r => Array.isArray(r) && r.some(c => String(c).trim() === 'ID'));
                                    if (headerIdx !== -1) {
                                        if (produtividadeHeaders.length === 0) {
                                            produtividadeHeaders = rows[headerIdx].map(h => h ? String(h).trim() : "");
                                        }
                                        
                                        const headMap = {};
                                        rows[headerIdx].forEach((col, idx) => {
                                            if (col !== undefined && col !== null) {
                                                headMap[String(col).trim()] = idx;
                                            }
                                        });

                                        for (let j = headerIdx + 1; j < rows.length; j++) {
                                            let row = rows[j];
                                            if (!Array.isArray(row) || row.length === 0) continue;
                                            
                                            let idRaw = row[headMap['ID']];
                                            if (idRaw === undefined || idRaw === null || idRaw === "") continue;
                                            
                                            let id = String(idRaw).trim();
                                            
                                            if (!globalProdutividade[id]) {
                                                let obj = {};
                                                produtividadeHeaders.forEach(h => {
                                                    if (h) obj[h] = row[headMap[h]] !== undefined ? row[headMap[h]] : "";
                                                });
                                                
                                                obj['Recebidos'] = parseInt(obj['Recebidos'], 10) || 0;
                                                obj['Finalizados'] = parseInt(obj['Finalizados'], 10) || 0;
                                                obj['Auxiliando'] = parseInt(obj['Auxiliando'], 10) || 0;
                                                
                                                globalProdutividade[id] = obj;
                                            } else {
                                                let atuaisRecebidos = parseInt(row[headMap['Recebidos']], 10) || 0;
                                                let atuaisFinalizados = parseInt(row[headMap['Finalizados']], 10) || 0;
                                                let atuaisAuxiliando = parseInt(row[headMap['Auxiliando']], 10) || 0;

                                                globalProdutividade[id]['Recebidos'] += atuaisRecebidos;
                                                globalProdutividade[id]['Finalizados'] += atuaisFinalizados;
                                                globalProdutividade[id]['Auxiliando'] += atuaisAuxiliando;
                                            }
                                        }
                                    }
                                } else if (isChamados) {
                                    let headerIdx = rows.findIndex(r => Array.isArray(r) && r.some(c => String(c).trim() === 'Nº'));
                                    if (headerIdx !== -1) {
                                        if (chamadosHeaders.length === 0) {
                                            chamadosHeaders = rows[headerIdx].map(h => h ? String(h).trim() : "");
                                        }
                                        
                                        const headMap = {};
                                        rows[headerIdx].forEach((col, idx) => {
                                            if (col !== undefined && col !== null) {
                                                headMap[String(col).trim()] = idx;
                                            }
                                        });

                                        for (let j = headerIdx + 1; j < rows.length; j++) {
                                            let row = rows[j];
                                            if (!Array.isArray(row) || row.length === 0) continue;
                                            
                                            let numRaw = row[headMap['Nº']];
                                            if (numRaw === undefined || numRaw === null || numRaw === "") continue;
                                            
                                            let ticketNum = String(numRaw).trim();
                                            
                                            if (!globalChamados[ticketNum]) {
                                                let obj = {};
                                                chamadosHeaders.forEach(h => {
                                                    if (h) obj[h] = row[headMap[h]] !== undefined ? row[headMap[h]] : "";
                                                });
                                                globalChamados[ticketNum] = obj;
                                            }
                                        }
                                    }
                                } else {
                                    if (!globalOutrasAbas[sheetName] || rows.length > globalOutrasAbas[sheetName].length) {
                                        globalOutrasAbas[sheetName] = rows;
                                    }
                                }
                            }
                        } catch (fileError) {
                            console.error(`Erro ao processar arquivo ${file.name}:`, fileError);
                            alert(`Atenção: Houve um problema ao ler a planilha "${file.name}". O processo continuará para as outras planilhas.`);
                        }
                    }

                    let produtividadeArray = Object.values(globalProdutividade);
                    let totalRecebidosGeral = 0;
                    let totalFinalizadosGeral = 0;

                    if (produtividadeHeaders.length > 0 && !produtividadeHeaders.includes('Porcentagem')) {
                        let idxFin = produtividadeHeaders.indexOf('Finalizados');
                        if(idxFin !== -1) {
                            produtividadeHeaders.splice(idxFin + 1, 0, 'Porcentagem');
                        } else {
                            produtividadeHeaders.push('Porcentagem');
                        }
                    }

                    produtividadeArray.forEach(tec => {
                        if (tec['Recebidos'] > 0) {
                            let perc = (tec['Finalizados'] / tec['Recebidos']) * 100;
                            tec['Porcentagem'] = perc.toFixed(2) + '%';
                        } else {
                            tec['Porcentagem'] = '0.00%';
                        }
                        totalRecebidosGeral += tec['Recebidos'];
                        totalFinalizadosGeral += tec['Finalizados'];
                    });

                    let chamadosArray = Object.values(globalChamados);

                    let periodText = "Período não identificado nas planilhas";
                    if (minDate && maxDate) {
                        periodText = `${formatDate(minDate)} - ${formatDate(maxDate)}`;
                    }

                    setResult({
                        periodo: periodText,
                        produtividade: produtividadeArray,
                        produtividadeHeaders: produtividadeHeaders.length > 0 ? produtividadeHeaders : ["Nenhum dado de Produtividade"],
                        totalRecebidosGeral,
                        totalFinalizadosGeral,
                        chamados: chamadosArray,
                        chamadosHeaders: chamadosHeaders.length > 0 ? chamadosHeaders : ["Nenhum dado de Chamados"],
                        outrasAbas: globalOutrasAbas
                    });

                } catch (error) {
                    console.error("Erro fatal ao processar arquivos:", error);
                    alert(`Ocorreu um erro inesperado ao processar os arquivos.\n\nDetalhe técnico: ${error.message}\n\nVerifique as planilhas e tente novamente.`);
                } finally {
                    setIsProcessing(false);
                }
            };

            const exportToExcel = () => {
                if (!result) return;

                const wb = XLSX.utils.book_new();

                if (result.produtividade.length > 0) {
                    let wsData = [
                        ["Relatório de Produtividade"],
                        ["Periodo", "", result.periodo],
                        ["Total Recebidos", "", result.totalRecebidosGeral],
                        ["Total Finalizados", "", result.totalFinalizadosGeral],
                        ["Porcentagem Finalizados", "", result.totalRecebidosGeral > 0 ? ((result.totalFinalizadosGeral / result.totalRecebidosGeral) * 100).toFixed(2) + "%" : "0.00%"],
                        [],
                        result.produtividadeHeaders
                    ];

                    result.produtividade.forEach(row => {
                        let rowData = result.produtividadeHeaders.map(h => row[h] !== undefined ? row[h] : "");
                        wsData.push(rowData);
                    });

                    const wsProd = XLSX.utils.aoa_to_sheet(wsData);
                    XLSX.utils.book_append_sheet(wb, wsProd, "Produtividade");
                }

                if (result.chamados.length > 0) {
                    let wsDataChamados = [result.chamadosHeaders];
                    result.chamados.forEach(row => {
                        let rowData = result.chamadosHeaders.map(h => row[h] !== undefined ? row[h] : "");
                        wsDataChamados.push(rowData);
                    });
                    const wsChamados = XLSX.utils.aoa_to_sheet(wsDataChamados);
                    XLSX.utils.book_append_sheet(wb, wsChamados, "Chamados por Técnico");
                }

                if (result.outrasAbas) {
                    Object.keys(result.outrasAbas).forEach(sheetName => {
                        if (sheetName !== "Produtividade" && !sheetName.includes("Chamados")) {
                            const wsOther = XLSX.utils.aoa_to_sheet(result.outrasAbas[sheetName]);
                            XLSX.utils.book_append_sheet(wb, wsOther, sheetName);
                        }
                    });
                }

                XLSX.writeFile(wb, "Relatorio_Consolidado_Atualizado.xlsx");
            };

            return (
                <div className="flex h-screen w-full overflow-hidden text-dark-text bg-dark-bg">
                    
                    {/* Sidebar / Menu Lateral */}
                    <aside className="w-64 bg-[#000000] border-r border-dark-border hidden md:flex flex-col flex-shrink-0 shadow-2xl z-20">
                        <div className="h-16 flex items-center px-6 border-b border-dark-border bg-dark-bg/30">
                            <div className="bg-brand-600 p-1.5 rounded-lg mr-3 shadow-lg shadow-brand-500/20">
                                <i data-lucide="layers" className="w-5 h-5 text-white"></i>
                            </div>
                            <span className="text-white font-bold text-lg tracking-tight">Data<span className="text-brand-400">Sync</span></span>
                        </div>
                        
                        <div className="p-4 flex-1 flex flex-col gap-2">
                            <p className="text-xs font-semibold text-dark-muted uppercase tracking-wider mb-2 mt-4 px-2">Ferramentas</p>
                            <a href="#" className="flex items-center px-3 py-2.5 bg-brand-600/10 text-brand-400 rounded-lg border border-brand-500/20 transition-all">
                                <i data-lucide="layout-dashboard" className="w-4 h-4 mr-3"></i>
                                Consolidador
                            </a>
                            
                            {/* Menus desnecessários ocultados 
                            <a href="#" className="flex items-center px-3 py-2.5 hover:bg-dark-surface rounded-lg transition-all text-dark-muted hover:text-white cursor-not-allowed opacity-60">
                                <i data-lucide="bar-chart-3" className="w-4 h-4 mr-3"></i>
                                Estatísticas
                            </a>
                            <a href="#" className="flex items-center px-3 py-2.5 hover:bg-dark-surface rounded-lg transition-all text-dark-muted hover:text-white cursor-not-allowed opacity-60">
                                <i data-lucide="settings" className="w-4 h-4 mr-3"></i>
                                Configurações
                            </a>
                            */}
                        </div>
                        
                        {/* Versão desnecessária ocultada
                        <div className="p-4 border-t border-dark-border text-xs text-dark-muted text-center">
                            Versão 2.1.0 Pro
                        </div>
                        */}
                    </aside>

                    {/* Área Principal */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        
                        {/* Header Superior */}
                        <header className="h-16 bg-dark-surface/80 backdrop-blur-md border-b border-dark-border flex items-center px-6 justify-between shadow-sm z-10 flex-shrink-0">
                            <div className="flex items-center gap-4">
                                <button className="md:hidden text-dark-muted hover:text-white transition-colors">
                                    <i data-lucide="menu" className="w-6 h-6"></i>
                                </button>
                                <h1 className="text-xl font-bold text-white tracking-tight">Consolidação de Dados</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                {/* Selo desnecessário ocultado
                                <div className="hidden sm:flex items-center gap-2 text-sm text-dark-muted bg-dark-bg px-3 py-1.5 rounded-full border border-dark-border">
                                    <i data-lucide="activity" className="w-4 h-4 text-emerald-400"></i>
                                    Sistema Operacional
                                </div>
                                */}
                            </div>
                        </header>

                        {/* Scrollable Content */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-6xl mx-auto space-y-6">
                                
                                {/* Upload Card */}
                                <div className="bg-dark-card rounded-2xl shadow-xl border border-dark-border p-1">
                                    <div className="p-5 md:p-8 flex flex-col lg:flex-row gap-6 items-center">
                                        
                                        <div 
                                            className={`flex-1 w-full relative border-2 border-dashed rounded-xl p-8 text-center transition-all cursor-pointer flex flex-col items-center justify-center min-h-[160px] 
                                                ${isDragging ? 'border-brand-500 bg-brand-900/10 scale-[1.01]' : 'border-dark-border bg-dark-surface/50 hover:bg-dark-surface hover:border-slate-500'}`}
                                            onDragOver={handleDragOver}
                                            onDragLeave={handleDragLeave}
                                            onDrop={handleDrop}
                                            onClick={() => fileInputRef.current.click()}
                                        >
                                            <input 
                                                type="file" 
                                                multiple 
                                                accept=".csv, .xlsx, .xls"
                                                onChange={handleFileChange}
                                                ref={fileInputRef}
                                                className="hidden"
                                            />
                                            <div className={`p-4 rounded-full mb-4 ${isDragging ? 'bg-brand-900/30 text-brand-400' : 'bg-dark-bg text-dark-muted shadow-sm border border-dark-border'}`}>
                                                <i data-lucide="cloud-upload" className="w-8 h-8"></i>
                                            </div>
                                            <h3 className="text-lg font-semibold text-white mb-1">Upload de Ficheiros</h3>
                                            <p className="text-dark-muted text-sm">
                                                Arraste os seus ficheiros aqui ou <span className="text-brand-400 font-medium">clique para procurar</span>
                                            </p>
                                        </div>
                                        
                                        <div className="flex flex-col gap-3 w-full lg:w-64">
                                            <button 
                                                onClick={processFiles}
                                                disabled={files.length === 0 || isProcessing}
                                                className={`w-full py-3.5 px-4 rounded-xl font-medium text-white shadow-lg transition-all flex items-center justify-center gap-2
                                                    ${files.length === 0 ? 'bg-slate-700 text-slate-400 cursor-not-allowed opacity-50' : 'bg-brand-600 hover:bg-brand-500 hover:shadow-brand-500/20 hover:-translate-y-0.5'}`}
                                            >
                                                {isProcessing ? (
                                                    <><i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i> A Processar...</>
                                                ) : (
                                                    <><i data-lucide="zap" className="w-5 h-5"></i> Iniciar Consolidação</>
                                                )}
                                            </button>
                                            
                                            {files.length > 0 && (
                                                <button
                                                    onClick={clearFiles}
                                                    className="w-full py-2.5 px-4 rounded-xl font-medium text-slate-300 bg-dark-bg border border-dark-border hover:bg-slate-800 hover:text-red-400 hover:border-red-900 transition-all text-sm flex items-center justify-center gap-2"
                                                >
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i> Limpar Lista
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    {/* Lista de Arquivos */}
                                    {files.length > 0 && (
                                        <div className="px-5 md:px-8 pb-6">
                                            <div className="border-t border-dark-border pt-4">
                                                <h4 className="text-xs font-semibold uppercase tracking-wider text-dark-muted mb-3 flex items-center gap-2">
                                                    <i data-lucide="paperclip" className="w-3.5 h-3.5"></i>
                                                    Ficheiros na fila ({files.length})
                                                </h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {files.map((f, i) => (
                                                        <span key={i} className="text-xs bg-dark-surface text-slate-300 px-3 py-1.5 rounded-md border border-dark-border flex items-center gap-2 max-w-[200px] truncate shadow-sm">
                                                            <i data-lucide="file-spreadsheet" className="w-3.5 h-3.5 text-emerald-500 flex-shrink-0"></i> 
                                                            <span className="truncate">{f.name}</span>
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Area de Resultados */}
                                {result && (
                                    <div className="bg-dark-card rounded-2xl shadow-xl border border-dark-border overflow-hidden animate-[fadeIn_0.5s_ease-out]">
                                        
                                        {/* Result Header */}
                                        <div className="bg-dark-surface/50 p-6 border-b border-dark-border flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                            <div>
                                                <h2 className="text-lg font-bold text-white flex items-center gap-2">
                                                    <i data-lucide="check-circle-2" className="w-5 h-5 text-emerald-400"></i>
                                                    Processamento Concluído
                                                </h2>
                                                <div className="mt-2 flex items-center gap-1.5 text-sm text-brand-400 bg-brand-900/30 border border-brand-800/50 px-3 py-1 rounded-md w-fit font-medium">
                                                    <i data-lucide="calendar-days" className="w-4 h-4"></i>
                                                    Período: {result.periodo}
                                                </div>
                                            </div>
                                            <button 
                                                onClick={exportToExcel}
                                                className="bg-brand-600 hover:bg-brand-500 text-white px-5 py-2.5 rounded-xl font-medium flex items-center gap-2 shadow-lg shadow-brand-900/20 transition-all hover:-translate-y-0.5"
                                            >
                                                <i data-lucide="download" className="w-4 h-4"></i>
                                                Exportar Planilha Final
                                            </button>
                                        </div>

                                        {/* Dashboard Cards */}
                                        {result.produtividade.length > 0 && (
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-6 border-b border-dark-border bg-dark-card">
                                                <div className="bg-dark-surface p-5 rounded-xl border border-dark-border shadow-sm flex flex-col justify-center">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <div className="bg-slate-800 p-1.5 rounded-md text-slate-300"><i data-lucide="users" className="w-4 h-4"></i></div>
                                                        <p className="text-xs font-semibold text-dark-muted uppercase tracking-wide">Técnicos</p>
                                                    </div>
                                                    <p className="text-3xl font-bold text-white">{result.produtividade.length}</p>
                                                </div>
                                                
                                                <div className="bg-dark-surface p-5 rounded-xl border border-dark-border shadow-sm flex flex-col justify-center relative overflow-hidden">
                                                    <div className="absolute -right-4 -top-4 text-brand-900 opacity-20"><i data-lucide="inbox" className="w-24 h-24"></i></div>
                                                    <div className="flex items-center gap-2 mb-2 relative z-10">
                                                        <div className="bg-brand-900/40 p-1.5 rounded-md text-brand-400"><i data-lucide="arrow-down-to-line" className="w-4 h-4"></i></div>
                                                        <p className="text-xs font-semibold text-brand-400 uppercase tracking-wide">Recebidos</p>
                                                    </div>
                                                    <p className="text-3xl font-bold text-white relative z-10">{result.totalRecebidosGeral}</p>
                                                </div>
                                                
                                                <div className="bg-dark-surface p-5 rounded-xl border border-dark-border shadow-sm flex flex-col justify-center relative overflow-hidden">
                                                    <div className="absolute -right-4 -top-4 text-emerald-900 opacity-20"><i data-lucide="check-square" className="w-24 h-24"></i></div>
                                                    <div className="flex items-center gap-2 mb-2 relative z-10">
                                                        <div className="bg-emerald-900/40 p-1.5 rounded-md text-emerald-400"><i data-lucide="check" className="w-4 h-4"></i></div>
                                                        <p className="text-xs font-semibold text-emerald-400 uppercase tracking-wide">Finalizados</p>
                                                    </div>
                                                    <div className="flex items-end gap-2 relative z-10">
                                                        <p className="text-3xl font-bold text-white">{result.totalFinalizadosGeral}</p>
                                                        <span className="text-sm font-bold text-emerald-400 bg-emerald-900/50 px-2 py-0.5 rounded mb-1">
                                                            {result.totalRecebidosGeral > 0 ? ((result.totalFinalizadosGeral / result.totalRecebidosGeral) * 100).toFixed(1) : 0}%
                                                        </span>
                                                    </div>
                                                </div>

                                                {result.outrasAbas && Object.keys(result.outrasAbas).length > 0 && (
                                                    <div className="bg-dark-surface p-5 rounded-xl border border-dark-border shadow-sm flex flex-col justify-center">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            <div className="bg-purple-900/40 p-1.5 rounded-md text-purple-400"><i data-lucide="database" className="w-4 h-4"></i></div>
                                                            <p className="text-xs font-semibold text-purple-400 uppercase tracking-wide">Abas Extras</p>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <p className="text-3xl font-bold text-white">{Object.keys(result.outrasAbas).length}</p>
                                                            <span className="text-xs text-dark-muted leading-tight">Planilhas<br/>preservadas</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* Tabela Tabs */}
                                        <div className="flex border-b border-dark-border px-6 pt-2 bg-dark-surface/50">
                                            <button 
                                                onClick={() => setActiveTab('produtividade')}
                                                className={`py-3 px-5 font-medium text-sm border-b-2 transition-all flex items-center gap-2 ${activeTab === 'produtividade' ? 'border-brand-500 text-brand-400 bg-dark-card rounded-t-lg' : 'border-transparent text-dark-muted hover:text-slate-300 hover:bg-dark-surface rounded-t-lg'}`}
                                            >
                                                <i data-lucide="bar-chart-2" className="w-4 h-4"></i>
                                                Produtividade ({result.produtividade.length})
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab('chamados')}
                                                className={`py-3 px-5 font-medium text-sm border-b-2 transition-all flex items-center gap-2 ${activeTab === 'chamados' ? 'border-brand-500 text-brand-400 bg-dark-card rounded-t-lg' : 'border-transparent text-dark-muted hover:text-slate-300 hover:bg-dark-surface rounded-t-lg'}`}
                                            >
                                                <i data-lucide="list" className="w-4 h-4"></i>
                                                Chamados ({result.chamados.length})
                                            </button>
                                        </div>

                                        {/* Conteúdo da Tabela */}
                                        <div className="bg-dark-card rounded-b-xl">
                                            {activeTab === 'produtividade' && (
                                                <div className="table-container p-0 m-0">
                                                    <table className="min-w-full text-left text-sm whitespace-nowrap">
                                                        <thead className="text-xs text-dark-muted uppercase font-semibold bg-dark-surface border-b border-dark-border">
                                                            <tr>
                                                                {result.produtividadeHeaders.map((h, i) => (
                                                                    <th key={i} className="px-6 py-4">{h}</th>
                                                                ))}
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-dark-border/50">
                                                            {result.produtividade.length === 0 ? (
                                                                <tr><td colSpan="10" className="px-6 py-8 text-center text-dark-muted">Nenhum dado encontrado</td></tr>
                                                            ) : (
                                                                result.produtividade.map((row, i) => (
                                                                    <tr key={i} className="hover:bg-dark-surface/80 transition-colors">
                                                                        {result.produtividadeHeaders.map((h, j) => (
                                                                            <td key={j} className={`px-6 py-3 ${h === 'Nome Técnico' ? 'font-medium text-slate-200' : 'text-slate-300'}`}>
                                                                                {h === 'Porcentagem' ? (
                                                                                    <span className={`px-2.5 py-1 rounded-md text-xs font-bold border ${parseFloat(row[h]) >= 90 ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : parseFloat(row[h]) >= 70 ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20'}`}>
                                                                                        {row[h]}
                                                                                    </span>
                                                                                ) : String(row[h] !== undefined && row[h] !== null ? row[h] : '')}
                                                                            </td>
                                                                        ))}
                                                                    </tr>
                                                                ))
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}

                                            {activeTab === 'chamados' && (
                                                <div className="table-container p-0 m-0">
                                                    <table className="min-w-full text-left text-sm whitespace-nowrap">
                                                        <thead className="text-xs text-dark-muted uppercase font-semibold bg-dark-surface border-b border-dark-border">
                                                            <tr>
                                                                {result.chamadosHeaders.map((h, i) => (
                                                                    <th key={i} className="px-6 py-4">{h}</th>
                                                                ))}
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-dark-border/50">
                                                            {result.chamados.length === 0 ? (
                                                                <tr><td colSpan="10" className="px-6 py-8 text-center text-dark-muted">Nenhum dado encontrado</td></tr>
                                                            ) : (
                                                                result.chamados.map((row, i) => (
                                                                    <tr key={i} className="hover:bg-dark-surface/80 transition-colors">
                                                                        {result.chamadosHeaders.map((h, j) => (
                                                                            <td key={j} className="px-6 py-3 text-slate-300 truncate max-w-[250px]" title={String(row[h] || '')}>
                                                                                {String(row[h] !== undefined && row[h] !== null ? row[h] : '')}
                                                                            </td>
                                                                        ))}
                                                                    </tr>
                                                                ))
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
